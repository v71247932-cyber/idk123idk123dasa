<!DOCTYPE html>
<html lang="ro">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <title>Meat Shredder Ad-Style</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050a14
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif
    }

    #wrap {
      position: relative;
      width: min(100vw, 56.25vh);
      aspect-ratio: 9/16;
      background: #f0f8ff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
      border: 4px solid #333;
    }

    #canvas {
      width: 100%;
      height: 100%;
      display: block
    }

    /* ── Overlay ── */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: rgba(0, 0, 0, .7);
      backdrop-filter: blur(8px);
      z-index: 100;
      transition: opacity 0.5s;
    }

    #overlay h1 {
      font-size: 52px;
      color: #fff;
      text-align: center;
      text-shadow: 0 0 30px #ff4757;
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 0.9
    }

    #overlay p {
      color: #ccc;
      text-align: center;
      max-width: 80%;
      font-size: 18px
    }

    #play-btn {
      padding: 18px 70px;
      font-size: 28px;
      background: linear-gradient(180deg, #ff4757, #ff6b81);
      color: #fff;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      font-weight: 900;
      box-shadow: 0 12px 40px rgba(255, 71, 87, .6);
      transition: transform 0.2s;
    }

    #play-btn:hover {
      transform: scale(1.05)
    }

    /* ── HUD ── */
    #hud {
      position: absolute;
      top: 30px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 15px;
      pointer-events: none;
      z-index: 50;
    }

    .hud-box {
      background: rgba(255, 255, 255, 0.95);
      padding: 10px 20px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      display: flex;
      align-items: center;
      gap: 12px;
      border: 2px solid #ff4757;
    }

    .hud-icon {
      font-size: 24px
    }

    .hud-stat {
      display: flex;
      flex-direction: column
    }

    .hud-label {
      font-size: 10px;
      color: #888;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px
    }

    .hud-val {
      font-size: 22px;
      font-weight: 900;
      color: #2d3436;
      line-height: 1
    }

    #money-container {
      position: absolute;
      bottom: 40px;
      right: 30px;
      background: #2ed573;
      color: white;
      padding: 10px 25px;
      border-radius: 50px;
      font-weight: 900;
      font-size: 26px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 10px 30px rgba(46, 213, 115, 0.4);
      z-index: 50;
    }
  </style>
</head>

<body>
  <div id="wrap">
    <canvas id="canvas"></canvas>
    <div id="hud">
      <div class="hud-box">
        <div class="hud-icon">🥩</div>
        <div class="hud-stat">
          <div class="hud-label">Carne</div>
          <div class="hud-val" id="v-meat">0</div>
        </div>
      </div>
      <div class="hud-box">
        <div class="hud-icon">🔥</div>
        <div class="hud-stat">
          <div class="hud-label">Val</div>
          <div class="hud-val" id="v-wave">1</div>
        </div>
      </div>
    </div>
    <div id="money-container">💵 <span id="v-money">0</span></div>
    <div id="overlay">
      <h1>MEAT<br />SHREDDER</h1>
      <p>Procesează carnea uriașă de dinozaur pentru supraviețuire!</p>
      <button id="play-btn">START</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const CW = 480, CH = 854;
    canvas.width = CW; canvas.height = CH;

    // ── CONFIG ──
    const CONFIG = {
      sawX: CW - 70,
      sawRows: 14,
      sawR: 26,
      meatSpawnRate: 1800,
      meatSpeed: 95,
      gravity: 1200,
      shredYield: 15, // particles per impact
      shredForce: 450,
    };

    // ── STATE ──
    let running = false;
    let meatTotal = 0;
    let money = 0;
    let wave = 1;
    let lastTs = 0;
    let spawnTimer = 0;
    let waveTimer = 0;

    let giantSteaks = [];
    let tinySteaks = [];
    let saws = [];
    let snow = [];
    let player = { x: 70, y: CH - 140, bob: 0, frame: 0 };

    // ── ASSETS / INIT ──
    function init() {
      // Saws
      saws = [];
      const startY = 40;
      const spacing = 62;
      for (let i = 0; i < CONFIG.sawRows; i++) {
        saws.push({ x: CONFIG.sawX, y: startY + i * spacing, rot: Math.random() * Math.PI * 2 });
      }
      // Snow
      snow = Array.from({ length: 60 }, () => ({
        x: Math.random() * CW, y: Math.random() * CH, r: 1 + Math.random() * 4, s: 30 + Math.random() * 60
      }));
    }

    // ── DRAWING ──

    function drawGiantSteak(x, y, scale) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(scale, scale);

      // Marble-like Meat Slab
      ctx.fillStyle = '#eb4d4b'; // Primary meat color
      ctx.beginPath();
      ctx.moveTo(-60, -30);
      ctx.lineTo(60, -35);
      ctx.lineTo(70, 40);
      ctx.lineTo(-50, 45);
      ctx.closePath();
      ctx.fill();

      // Highlight
      ctx.fillStyle = '#ff7979';
      ctx.beginPath();
      ctx.moveTo(-50, -25);
      ctx.lineTo(50, -30);
      ctx.lineTo(55, 0);
      ctx.lineTo(-45, 5);
      ctx.closePath();
      ctx.fill();

      // Bone
      ctx.fillStyle = '#f9f9f9';
      ctx.beginPath();
      ctx.arc(40, 10, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ddd';
      ctx.beginPath();
      ctx.arc(40, 10, 5, 0, Math.PI * 2);
      ctx.fill();

      // Marbling (Fat)
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 4;
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.moveTo(-40, 10);
      ctx.quadraticCurveTo(0, 30, 30, 10);
      ctx.stroke();

      ctx.restore();
    }

    function drawTinySteak(s) {
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(s.rot);
      ctx.scale(0.3, 0.3);

      ctx.fillStyle = '#ff4757';
      ctx.beginPath();
      ctx.ellipse(0, 0, 30, 20, 1, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = 'white';
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.arc(10, 0, 8, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawPlayer() {
      ctx.save();
      const bobY = Math.sin(player.bob) * 6;
      ctx.translate(player.x, player.y + bobY);

      // Parka (Blue)
      ctx.fillStyle = '#0984e3';
      ctx.beginPath();
      ctx.roundRect(-25, -50, 50, 70, 15);
      ctx.fill();

      // Hood Trim (White Fur)
      ctx.fillStyle = '#dfe6e9';
      ctx.beginPath();
      ctx.ellipse(0, -55, 30, 25, 0, 0, Math.PI * 2);
      ctx.fill();

      // Face
      ctx.fillStyle = '#f3a683';
      ctx.beginPath();
      ctx.arc(0, -55, 18, 0, Math.PI * 2);
      ctx.fill();

      // Eyes
      ctx.fillStyle = '#2d3436';
      ctx.beginPath();
      ctx.arc(-8, -55, 2.5, 0, Math.PI * 2);
      ctx.arc(8, -55, 2.5, 0, Math.PI * 2);
      ctx.fill();

      // Hat (Beanie)
      ctx.fillStyle = '#d63031';
      ctx.beginPath();
      ctx.roundRect(-15, -75, 30, 15, 5);
      ctx.fill();

      // Legs
      ctx.strokeStyle = '#2d3436';
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(-10, 20); ctx.lineTo(-10 + Math.sin(player.bob * 2) * 5, 40);
      ctx.moveTo(10, 20); ctx.lineTo(10 - Math.sin(player.bob * 2) * 5, 40);
      ctx.stroke();

      ctx.restore();
    }

    function drawSaw(s) {
      ctx.save();
      ctx.translate(s.x, s.y);

      // Glow
      const grd = ctx.createRadialGradient(0, 0, 10, 0, 0, CONFIG.sawR * 2.5);
      grd.addColorStop(0, 'rgba(255,0,0,0.6)');
      grd.addColorStop(1, 'rgba(255,0,0,0)');
      ctx.fillStyle = grd;
      ctx.beginPath(); ctx.arc(0, 0, CONFIG.sawR * 2.5, 0, Math.PI * 2); ctx.fill();

      ctx.rotate(s.rot);

      // Teeth
      ctx.fillStyle = '#c0392b';
      for (let i = 0; i < 12; i++) {
        ctx.rotate((Math.PI * 2) / 12);
        ctx.beginPath();
        ctx.moveTo(CONFIG.sawR, 0);
        ctx.lineTo(CONFIG.sawR + 12, 6);
        ctx.lineTo(CONFIG.sawR, 12);
        ctx.fill();
      }

      // Disc
      ctx.fillStyle = '#e74c3c';
      ctx.beginPath();
      ctx.arc(0, 0, CONFIG.sawR, 0, Math.PI * 2);
      ctx.fill();

      // Centre
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI * 2); ctx.fill();

      ctx.restore();
    }

    // ── LOOP ──

    function loop(ts) {
      if (!running) return;
      const dt = (ts - lastTs) / 1000;
      lastTs = ts;

      // Wave Logic
      waveTimer += dt;
      if (waveTimer > 20) {
        waveTimer = 0; wave++;
        document.getElementById('v-wave').textContent = wave;
      }

      // Spawn Steaks
      spawnTimer += dt * 1000;
      if (spawnTimer > CONFIG.meatSpawnRate / (1 + wave * 0.15)) {
        spawnTimer = 0;
        giantSteaks.push({ x: -150, y: CH * 0.4 + Math.random() * 250, hp: 100 });
      }

      // Physics & Updates
      snow.forEach(s => {
        s.y += s.s * dt;
        if (s.y > CH) { s.y = -10; s.x = Math.random() * CW; }
      });

      player.bob += dt * 8;

      saws.forEach(s => s.rot += dt * 15);

      giantSteaks.forEach((m, idx) => {
        m.x += CONFIG.meatSpeed * dt;

        // Check Saw Intersection
        let hit = false;
        for (let s of saws) {
          const dx = s.x - m.x, dy = s.y - m.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < CONFIG.sawR + 60) {
            hit = true;
            // ASMR Shredding
            for (let i = 0; i < CONFIG.shredYield; i++) {
              tinySteaks.push({
                x: m.x + (Math.random() - 0.5) * 30,
                y: m.y + (Math.random() - 0.5) * 30,
                vx: 150 + Math.random() * CONFIG.shredForce,
                vy: -300 - Math.random() * 400,
                rot: Math.random() * Math.PI * 2,
                rv: (Math.random() - 0.5) * 15,
                life: 1.0
              });
            }
            meatTotal += CONFIG.shredYield;
            money += 2;
            m.hp -= 30 * dt;
          }
        }

        if (m.x > CONFIG.sawX + 80) giantSteaks.splice(idx, 1);
      });

      tinySteaks.forEach((s, idx) => {
        s.x += s.vx * dt;
        s.y += s.vy * dt;
        s.vy += CONFIG.gravity * dt;
        s.rot += s.rv * dt;
        s.life -= 0.4 * dt;
        if (s.y > CH + 50 || s.x > CW + 50 || s.life <= 0) tinySteaks.splice(idx, 1);
      });

      // ── RENDER ──
      ctx.clearRect(0, 0, CW, CH);

      // Gradient Sky
      const sky = ctx.createLinearGradient(0, 0, 0, CH);
      sky.addColorStop(0, '#74b9ff');
      sky.addColorStop(0.6, '#dfe6e9');
      sky.addColorStop(1, '#ffffff');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, CW, CH);

      // Snow Background Particles
      ctx.fillStyle = 'rgba(255,255,255,1)';
      snow.forEach(s => {
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
      });

      // Fences
      ctx.strokeStyle = '#636e72'; ctx.lineWidth = 14;
      ctx.beginPath(); ctx.moveTo(0, CH * 0.62); ctx.lineTo(CW, CH * 0.62); ctx.stroke();
      for (let i = 0; i < 6; i++) {
        ctx.fillRect(i * 100, CH * 0.62, 12, 120);
      }

      // Player
      drawPlayer();

      // Meat
      giantSteaks.forEach(m => drawGiantSteak(m.x, m.y, 1.0));
      tinySteaks.forEach(drawTinySteak);

      // Saws
      saws.forEach(drawSaw);

      // HUD Update
      document.getElementById('v-meat').textContent = Math.floor(meatTotal);
      document.getElementById('v-money').textContent = money;

      requestAnimationFrame(loop);
    }

    // ── INIT ──
    document.getElementById('play-btn').onclick = () => {
      document.getElementById('overlay').style.opacity = '0';
      setTimeout(() => document.getElementById('overlay').style.display = 'none', 500);
      running = true;
      lastTs = performance.now();
      requestAnimationFrame(loop);
    };

    init();
    // Background preview
    drawBG();
    function drawBG() {
      ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, CW, CH);
      ctx.fillStyle = '#dfe6e9'; ctx.fillRect(0, 0, CW, CH * 0.6);
      saws.forEach(drawSaw);
    }
  </script>
</body>

</html>
