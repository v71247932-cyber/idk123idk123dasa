<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DinoSaw Survival</title>
  <meta name="description" content="Joc survival: dinozauri vs fierăstraie rotative. Câți dinozauri pot supraviețui?" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    #ui-bar {
      display: flex;
      gap: 40px;
      padding: 10px 30px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      margin-bottom: 12px;
      backdrop-filter: blur(10px);
    }

    .stat {
      text-align: center;
    }
    .stat-label {
      font-size: 10px;
      letter-spacing: 2px;
      color: #888;
      text-transform: uppercase;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
    }
    #wave-value  { color: #f59e0b; }
    #score-value { color: #34d399; }
    #kills-value { color: #f87171; }

    #canvas {
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.08);
      box-shadow: 0 0 60px rgba(99,102,241,0.3);
      display: block;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      gap: 16px;
      border-radius: 12px;
      pointer-events: none;
    }
    #overlay h1 {
      font-size: 52px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -1px;
      text-shadow: 0 0 40px rgba(245,158,11,0.8);
    }
    #overlay p {
      color: #ccc;
      font-size: 16px;
    }
    #start-btn {
      margin-top: 8px;
      padding: 14px 48px;
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: #fff;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(239,68,68,0.4);
    }
    #start-btn:hover { transform: scale(1.05); box-shadow: 0 6px 30px rgba(239,68,68,0.6); }
    #start-btn:active { transform: scale(0.97); }

    #canvas-wrapper {
      position: relative;
    }
  </style>
</head>
<body>

<div id="ui-bar">
  <div class="stat">
    <div class="stat-label">Val</div>
    <div class="stat-value" id="wave-value">1</div>
  </div>
  <div class="stat">
    <div class="stat-label">Scor</div>
    <div class="stat-value" id="score-value">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Uciși</div>
    <div class="stat-value" id="kills-value">0</div>
  </div>
</div>

<div id="canvas-wrapper">
  <canvas id="canvas" width="960" height="480"></canvas>
  <div id="overlay">
    <h1>🦕 DinoSaw</h1>
    <p>Dinozaurii merg spre moarte. Tu doar privești.</p>
    <button id="start-btn">START JOC</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIG – toate valorile editabile centralizat
// ═══════════════════════════════════════════════════════════════
const CFG = {
  canvas: { w: 960, h: 480 },

  // Spawn
  spawnIntervalStart: 1400,   // ms
  spawnIntervalMin:   200,    // ms
  spawnRateMultiplier: 1.25,  // factor reducere interval per val

  // Valuri
  waveDuration: 15000,  // ms

  // Dinozauri
  dinoW: 54, dinoH: 38,
  dinoSpeedMin: 60,  dinoSpeedMax: 120, // px/s
  dinoHPStart:  40,
  dinoHPBonus:  15,   // HP suplimentar per val
  dinoColors: ['#4ade80','#86efac','#6ee7b7','#34d399','#a3e635'],

  // Fierăstraie
  sawRadius: 22,
  sawDPS: 30,          // damage per secundă
  sawRotSpeed: 6,      // rad/s
  sawCols: 2,
  sawRows: 9,
  sawSpacingY: 50,
  sawSpacingX: 48,
  sawWallX: 820,       // x centru primul col
  sawWallYStart: 30,   // y primul rând

  // Scor
  pointsPerKill: 10,

  // Particule
  particleCount: 14,
};

// ═══════════════════════════════════════════════════════════════
//  STARE GLOBALĂ
// ═══════════════════════════════════════════════════════════════
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

let state = 'idle'; // idle | running
let score = 0, kills = 0, wave = 1;
let spawnInterval = CFG.spawnIntervalStart;
let spawnTimer = 0;
let waveTimer = 0;
let lastTime = 0;

let dinosaurs  = [];
let saws       = [];
let particles  = [];

// ═══════════════════════════════════════════════════════════════
//  CLASE
// ═══════════════════════════════════════════════════════════════

class Dinosaur {
  constructor(currentWave) {
    this.x     = -CFG.dinoW;
    this.y     = CFG.canvas.h - 80;
    this.w     = CFG.dinoW;
    this.h     = CFG.dinoH;
    this.speed = CFG.dinoSpeedMin + Math.random() * (CFG.dinoSpeedMax - CFG.dinoSpeedMin);
    this.maxHP = CFG.dinoHPStart + currentWave * CFG.dinoHPBonus;
    this.hp    = this.maxHP;
    this.color = CFG.dinoColors[Math.floor(Math.random() * CFG.dinoColors.length)];
    this.scale = 0.8 + Math.random() * 0.4;
    this.dead  = false;
    // bobbing animation
    this.bobPhase = Math.random() * Math.PI * 2;
  }

  update(dt) {
    this.x += this.speed * dt;
    this.bobPhase += 8 * dt;
  }

  takeDamage(dmg) {
    if (this.dead) return;
    this.hp -= dmg;
    if (this.hp <= 0) this.die();
  }

  die() {
    if (this.dead) return;
    this.dead = true;
    kills++;
    score += CFG.pointsPerKill;
    updateUI();
    // Spawn particule
    for (let i = 0; i < CFG.particleCount; i++) {
      particles.push(new Particle(
        this.x + this.w / 2,
        this.y + this.h / 2
      ));
    }
  }

  draw(ctx) {
    const bobY = Math.sin(this.bobPhase) * 2;
    const cx = this.x + this.w / 2;
    const cy = this.y + this.h / 2 + bobY;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(this.scale, this.scale);

    // Corp
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, this.w / 2, this.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();

    // Cap
    ctx.beginPath();
    ctx.ellipse(this.w * 0.35, -this.h * 0.25, this.h * 0.28, this.h * 0.24, 0, 0, Math.PI * 2);
    ctx.fill();

    // Ochi
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.arc(this.w * 0.42, -this.h * 0.3, 3, 0, Math.PI * 2);
    ctx.fill();

    // Coadă
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-this.w * 0.5, 0);
    ctx.quadraticCurveTo(-this.w * 0.75, this.h * 0.2, -this.w * 0.9, -this.h * 0.1);
    ctx.stroke();

    // Picioare (2 perechi)
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 4;
    [[-0.15, 0.45], [0.1, 0.45]].forEach(([lx, ly]) => {
      ctx.beginPath();
      ctx.moveTo(lx * this.w, ly * this.h);
      ctx.lineTo((lx - 0.04) * this.w, (ly + 0.35) * this.h);
      ctx.stroke();
    });

    ctx.restore();

    // HP bar
    const barW = this.w * this.scale;
    const barH = 4;
    const bx = this.x + (this.w - barW) / 2;
    const by = this.y - 10 + bobY;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(bx, by, barW, barH);
    ctx.fillStyle = this.hp / this.maxHP > 0.5 ? '#4ade80' : this.hp / this.maxHP > 0.25 ? '#fbbf24' : '#f87171';
    ctx.fillRect(bx, by, barW * (this.hp / this.maxHP), barH);
  }
}

// ─────────────────────────────────────────────────────────────
class Saw {
  constructor(x, y) {
    this.x    = x;
    this.y    = y;
    this.r    = CFG.sawRadius;
    this.rot  = Math.random() * Math.PI * 2;
    this.dead = false; // saws never die
  }

  update(dt) {
    this.rot += CFG.sawRotSpeed * dt;
  }

  overlaps(dino) {
    // Circle vs AABB collision
    const cx = dino.x + dino.w / 2;
    const cy = dino.y + dino.h / 2;
    const hw = (dino.w * dino.scale) / 2;
    const hh = (dino.h * dino.scale) / 2;
    const nearX = Math.max(dino.x + dino.w / 2 - hw, Math.min(cx, dino.x + dino.w / 2 + hw));
    const nearY = Math.max(dino.y + dino.h / 2 - hh, Math.min(cy, dino.y + dino.h / 2 + hh));
    const dx = this.x - nearX;
    const dy = this.y - nearY;
    return dx * dx + dy * dy < this.r * this.r;
  }

  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);

    // Glow
    const grd = ctx.createRadialGradient(0, 0, this.r * 0.3, 0, 0, this.r * 1.5);
    grd.addColorStop(0, 'rgba(239,68,68,0.3)');
    grd.addColorStop(1, 'rgba(239,68,68,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(0, 0, this.r * 1.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.rotate(this.rot);
    const teeth = 10;
    ctx.fillStyle = '#94a3b8';
    ctx.beginPath();
    for (let i = 0; i < teeth; i++) {
      const ang = (i / teeth) * Math.PI * 2;
      const ang2 = ((i + 0.5) / teeth) * Math.PI * 2;
      const or  = this.r;
      const ir  = this.r * 0.65;
      const tip = this.r * 1.22;
      ctx.lineTo(Math.cos(ang) * ir, Math.sin(ang) * ir);
      ctx.lineTo(Math.cos(ang2 - 0.08) * tip, Math.sin(ang2 - 0.08) * tip);
      ctx.lineTo(Math.cos(ang2 + 0.08) * tip, Math.sin(ang2 + 0.08) * tip);
      ctx.lineTo(Math.cos(ang + (1 / teeth) * Math.PI * 2) * ir, Math.sin(ang + (1 / teeth) * Math.PI * 2) * ir);
    }
    ctx.closePath();
    ctx.fill();

    // Disc central
    ctx.fillStyle = '#e2e8f0';
    ctx.beginPath();
    ctx.arc(0, 0, this.r * 0.55, 0, Math.PI * 2);
    ctx.fill();

    // Centre bolt
    ctx.fillStyle = '#475569';
    ctx.beginPath();
    ctx.arc(0, 0, this.r * 0.15, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }
}

// ─────────────────────────────────────────────────────────────
class Particle {
  constructor(x, y) {
    this.x  = x;
    this.y  = y;
    const ang = Math.random() * Math.PI * 2;
    const spd = 60 + Math.random() * 180;
    this.vx = Math.cos(ang) * spd;
    this.vy = Math.sin(ang) * spd - 60;
    this.life    = 1.0;
    this.decay   = 0.9 + Math.random() * 0.8;
    this.size    = 4 + Math.random() * 6;
    const hue    = 0 + Math.random() * 30; // roșii / portocalii
    this.color   = `hsl(${hue},90%,55%)`;
    this.dead    = false;
  }

  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vy += 250 * dt; // gravity
    this.life -= this.decay * dt;
    if (this.life <= 0) this.dead = true;
  }

  draw(ctx) {
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
function initSaws() {
  saws = [];
  for (let c = 0; c < CFG.sawCols; c++) {
    for (let r = 0; r < CFG.sawRows; r++) {
      saws.push(new Saw(
        CFG.sawWallX + c * CFG.sawSpacingX,
        CFG.sawWallYStart + r * CFG.sawSpacingY
      ));
    }
  }
}

function spawnDino() {
  const spawnY = CFG.canvas.h - 80 - Math.random() * 20;
  const d = new Dinosaur(wave);
  d.y = spawnY;
  dinosaurs.push(d);
}

// ═══════════════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════════════
function gameLoop(ts) {
  if (state !== 'running') return;
  requestAnimationFrame(gameLoop);

  const dt = Math.min((ts - lastTime) / 1000, 0.05); // cap la 50ms
  lastTime = ts;

  // ── Timere ────────────────────────────────────────────────
  spawnTimer += dt * 1000;
  if (spawnTimer >= spawnInterval) {
    spawnTimer = 0;
    spawnDino();
  }

  waveTimer += dt * 1000;
  if (waveTimer >= CFG.waveDuration) {
    waveTimer = 0;
    wave++;
    spawnInterval = Math.max(CFG.spawnIntervalMin, spawnInterval / CFG.spawnRateMultiplier);
    updateUI();
  }

  // ── Update ─────────────────────────────────────────────────
  dinosaurs.forEach(d => d.update(dt));
  saws.forEach(s => s.update(dt));
  particles.forEach(p => p.update(dt));

  // ── Coliziuni saw ↔ dino ───────────────────────────────────
  saws.forEach(saw => {
    dinosaurs.forEach(dino => {
      if (!dino.dead && saw.overlaps(dino)) {
        dino.takeDamage(CFG.sawDPS * dt);
      }
    });
  });

  // ── Cleanup ─────────────────────────────────────────────────
  dinosaurs = dinosaurs.filter(d => !d.dead && d.x < CFG.canvas.w + 100);
  particles = particles.filter(p => !p.dead);

  // ── Draw ────────────────────────────────────────────────────
  draw();
}

// ═══════════════════════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════════════════════
function draw() {
  const W = CFG.canvas.w, H = CFG.canvas.h;

  // ── Fundal ────────────────────────────────────────────────
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#0f172a');
  bgGrad.addColorStop(1, '#1e293b');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  drawStars();

  // ── Platformă / sol ───────────────────────────────────────
  const groundY = H - 55;
  const floorGrad = ctx.createLinearGradient(0, groundY, 0, H);
  floorGrad.addColorStop(0, '#334155');
  floorGrad.addColorStop(1, '#1e293b');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, groundY, W, H - groundY);

  // Linie platformă
  ctx.strokeStyle = 'rgba(148,163,184,0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(W, groundY);
  ctx.stroke();

  // Gheață texture (linii orizontale)
  ctx.strokeStyle = 'rgba(148,163,184,0.06)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 8; i++) {
    ctx.beginPath();
    ctx.moveTo(0, groundY + 6 + i * 6);
    ctx.lineTo(W, groundY + 6 + i * 6);
    ctx.stroke();
  }

  // ── Fundal zid fierăstraie ─────────────────────────────────
  const wallX = CFG.sawWallX - CFG.sawRadius - 10;
  const wallW = CFG.sawCols * CFG.sawSpacingX + CFG.sawRadius * 2 + 20;
  ctx.fillStyle = 'rgba(15,23,42,0.7)';
  ctx.fillRect(wallX, 0, wallW, H);
  ctx.fillStyle = 'rgba(239,68,68,0.08)';
  ctx.fillRect(wallX, 0, wallW, H);

  // Linie de pericol
  ctx.strokeStyle = 'rgba(239,68,68,0.4)';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 6]);
  ctx.beginPath();
  ctx.moveTo(wallX, 0);
  ctx.lineTo(wallX, H);
  ctx.stroke();
  ctx.setLineDash([]);

  // ── Obiecte ───────────────────────────────────────────────
  dinosaurs.forEach(d => d.draw(ctx));
  saws.forEach(s => s.draw(ctx));
  particles.forEach(p => p.draw(ctx));

  // ── Spawn indicator stânga ────────────────────────────────
  const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 300);
  ctx.fillStyle = `rgba(99,102,241,${0.15 + pulse * 0.15})`;
  ctx.fillRect(0, 0, 12, H);
}

// Stele de fundal (generate o singură dată)
const STARS = Array.from({length: 80}, () => ({
  x: Math.random() * 960,
  y: Math.random() * 300,
  r: Math.random() * 1.2 + 0.3,
  a: Math.random()
}));
function drawStars() {
  STARS.forEach(s => {
    ctx.globalAlpha = s.a * (0.4 + 0.3 * Math.sin(Date.now() / 800 + s.x));
    ctx.fillStyle = '#e2e8f0';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════════════
function updateUI() {
  document.getElementById('wave-value').textContent  = wave;
  document.getElementById('score-value').textContent = score;
  document.getElementById('kills-value').textContent = kills;
}

// ═══════════════════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════════════════
function startGame() {
  score = 0; kills = 0; wave = 1;
  spawnInterval = CFG.spawnIntervalStart;
  spawnTimer = 0; waveTimer = 0;
  dinosaurs = []; particles = [];
  updateUI();
  initSaws();
  overlay.style.display = 'none';
  state = 'running';
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

document.getElementById('start-btn').addEventListener('click', startGame);

// Draw static frame while idle
initSaws();
draw();
</script>
</body>
</html>
