<!DOCTYPE html>
<html lang="ro">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0" />
  <title>Meat Shredder Survival</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050a14
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif
    }

    #wrap {
      position: relative;
      width: min(100vw, 56.25vh);
      aspect-ratio: 9/16;
      background: #f0f8ff;
      /* Snow color fallback */
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 100px rgba(0, 0, 0, 0.5);
    }

    #canvas {
      width: 100%;
      height: 100%;
      display: block
    }

    /* ── Overlay ── */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: rgba(0, 0, 0, .6);
      backdrop-filter: blur(10px);
      z-index: 20;
      transition: opacity 0.5s;
    }

    #overlay h1 {
      font-size: 42px;
      color: #fff;
      text-align: center;
      text-shadow: 0 0 20px #ff0000;
      font-weight: 900
    }

    #play-btn {
      padding: 15px 60px;
      font-size: 24px;
      background: #ff4757;
      color: #fff;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 10px 30px rgba(255, 71, 87, .5);
    }

    /* ── HUD ── */
    #hud {
      position: absolute;
      top: 20px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 20px;
      pointer-events: none;
      z-index: 10;
    }

    .hud-item {
      background: rgba(255, 255, 255, 0.9);
      padding: 8px 20px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hud-label {
      font-size: 12px;
      color: #777;
      font-weight: bold
    }

    .hud-val {
      font-size: 24px;
      font-weight: 900;
      color: #2f3542
    }

    #money-container {
      position: absolute;
      bottom: 30px;
      right: 20px;
      background: #2ed573;
      color: white;
      padding: 5px 15px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 5px 15px rgba(46, 213, 115, 0.4);
    }
  </style>
</head>

<body>
  <div id="wrap">
    <canvas id="canvas"></canvas>
    <div id="hud">
      <div class="hud-item">
        <div class="hud-label">🥩 CARNE</div>
        <div class="hud-val" id="v-meat">0</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">🔥 VAL</div>
        <div class="hud-val" id="v-wave">1</div>
      </div>
    </div>
    <div id="money-container">💵 <span id="v-money">0</span></div>
    <div id="overlay">
      <h1>MEAT<br />SHREDDER</h1>
      <button id="play-btn">START</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const CW = 480, CH = 854;
    canvas.width = CW; canvas.height = CH;

    // ── CONFIG ──
    const CONFIG = {
      sawX: CW - 70,
      sawRows: 12,
      sawR: 28,
      meatSpawnRate: 1500, // ms
      meatSpeed: 80, // px/s
      gravity: 1000,
      shredCount: 8, // pieces per "slice"
    };

    // ── STATE ──
    let running = false;
    let meatCount = 0;
    let money = 0;
    let wave = 1;
    let lastTs = 0;
    let spawnTimer = 0;
    let waveTimer = 0;

    let meatBlocks = [];
    let miniSteaks = []; // flying bits
    let saws = [];
    let snow = [];
    let player = { x: 50, y: CH - 150, bob: 0 };

    // ── INIT ──
    function init() {
      // Saws
      saws = [];
      const startY = 100;
      const spacing = 60;
      for (let i = 0; i < CONFIG.sawRows; i++) {
        saws.push({ x: CONFIG.sawX, y: startY + i * spacing, rot: Math.random() * Math.PI * 2 });
      }
      // Snow
      snow = Array.from({ length: 50 }, () => ({
        x: Math.random() * CW, y: Math.random() * CH, r: 1 + Math.random() * 3, s: 20 + Math.random() * 40
      }));
    }

    // ── DRAWING HELPERS ──
    function drawSteak(x, y, scale, angle) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle || 0);
      ctx.scale(scale, scale);

      // Meat body
      ctx.fillStyle = '#ff4757';
      ctx.beginPath();
      ctx.ellipse(0, 0, 40, 25, 0.2, 0, Math.PI * 2);
      ctx.fill();

      // Fat/Marbling
      ctx.strokeStyle = '#ff7f7f';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-20, -5);
      ctx.quadraticCurveTo(0, 5, 20, -5);
      ctx.stroke();

      // Bone
      ctx.fillStyle = '#f1f2f6';
      ctx.beginPath();
      ctx.arc(15, 0, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#dfe4ea';
      ctx.beginPath();
      ctx.arc(15, 0, 4, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawPlayer(x, y, bob) {
      ctx.save();
      ctx.translate(x, y + Math.sin(bob) * 5);

      // Blue Parka
      ctx.fillStyle = '#1e90ff';
      ctx.fillRect(-20, -40, 40, 60);

      // Hood (fur)
      ctx.fillStyle = '#f1f2f6';
      ctx.beginPath();
      ctx.arc(0, -45, 25, 0, Math.PI * 2);
      ctx.fill();

      // Face
      ctx.fillStyle = '#ffdbac';
      ctx.beginPath();
      ctx.arc(0, -45, 18, 0, Math.PI * 2);
      ctx.fill();

      // Cap
      ctx.fillStyle = '#2f3542';
      ctx.fillRect(-15, -60, 30, 15);

      ctx.restore();
    }

    function drawSaw(s) {
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(s.rot);

      // Teeth
      ctx.fillStyle = '#ff0000';
      for (let i = 0; i < 12; i++) {
        ctx.rotate((Math.PI * 2) / 12);
        ctx.beginPath();
        ctx.moveTo(CONFIG.sawR, 0);
        ctx.lineTo(CONFIG.sawR + 10, 5);
        ctx.lineTo(CONFIG.sawR, 10);
        ctx.fill();
      }

      // Blade disc
      ctx.fillStyle = '#ff4d4d';
      ctx.beginPath();
      ctx.arc(0, 0, CONFIG.sawR, 0, Math.PI * 2);
      ctx.fill();

      // Shine
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.arc(-5, -5, 10, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    // ── LOOP ──
    function loop(ts) {
      if (!running) return;
      const dt = (ts - lastTs) / 1000;
      lastTs = ts;

      // Update wave
      waveTimer += dt;
      if (waveTimer > 15) {
        waveTimer = 0; wave++;
        document.getElementById('v-wave').textContent = wave;
      }

      // Spawn meat
      spawnTimer += dt * 1000;
      if (spawnTimer > CONFIG.meatSpawnRate / (1 + wave * 0.2)) {
        spawnTimer = 0;
        meatBlocks.push({ x: -100, y: CH * 0.4 + Math.random() * 200, hp: 100 });
      }

      // Update Snow
      snow.forEach(s => {
        s.y += s.s * dt;
        if (s.y > CH) s.y = -10;
      });

      // Update Player
      player.bob += dt * 5;

      // Update Saws
      saws.forEach(s => s.rot += dt * 10);

      // Update Meat Blocks
      meatBlocks.forEach((m, idx) => {
        m.x += CONFIG.meatSpeed * dt;

        // Check saw collision
        saws.forEach(s => {
          const dx = s.x - m.x, dy = s.y - m.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < CONFIG.sawR + 40) {
            // Shredding!
            for (let i = 0; i < CONFIG.shredCount; i++) {
              miniSteaks.push({
                x: m.x + (Math.random() - 0.5) * 20,
                y: m.y + (Math.random() - 0.5) * 20,
                vx: 100 + Math.random() * 200,
                vy: -200 - Math.random() * 300,
                rot: Math.random() * Math.PI * 2,
                rv: (Math.random() - 0.5) * 10
              });
            }
            meatCount += CONFIG.shredCount;
            money += 1;
            m.hp -= 20 * dt; // not really used but for logic
            // Block is consumed by saws slowy or fast? Let's say it stays while shredding.
          }
        });

        // If passed saws or small
        if (m.x > CONFIG.sawX + 50) meatBlocks.splice(idx, 1);
      });

      // Update Mini Steaks (physics)
      miniSteaks.forEach((s, idx) => {
        s.x += s.vx * dt;
        s.y += s.vy * dt;
        s.vy += CONFIG.gravity * dt;
        s.rot += s.rv * dt;
        if (s.y > CH + 50 || s.x > CW + 50) miniSteaks.splice(idx, 1);
      });

      // ── DRAW ──
      ctx.clearRect(0, 0, CW, CH);

      // Background (Snowy Ground)
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, CH * 0.6, CW, CH * 0.4);

      // Sky / Snow
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      snow.forEach(s => {
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
      });

      // Fences (Simple ad style)
      ctx.strokeStyle = '#a4b0be';
      ctx.lineWidth = 10;
      ctx.strokeRect(0, CH * 0.6, CW, 10);

      // Player
      drawPlayer(player.x, player.y, player.bob);

      // Meat Blocks
      meatBlocks.forEach(m => drawSteak(m.x, m.y, 1.2));

      // Mini Steaks
      miniSteaks.forEach(s => drawSteak(s.x, s.y, 0.4, s.rot));

      // Saws
      saws.forEach(drawSaw);

      document.getElementById('v-meat').textContent = meatCount;
      document.getElementById('v-money').textContent = money;

      requestAnimationFrame(loop);
    }

    // ── EVENTS ──
    document.getElementById('play-btn').onclick = () => {
      document.getElementById('overlay').style.opacity = '0';
      setTimeout(() => document.getElementById('overlay').style.display = 'none', 500);
      running = true;
      lastTs = performance.now();
      requestAnimationFrame(loop);
    };

    init();
    // Initial draw
    drawBG();
    function drawBG() {
      ctx.fillStyle = '#f0f8ff';
      ctx.fillRect(0, 0, CW, CH);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, CH * 0.6, CW, CH * 0.4);
      saws.forEach(drawSaw);
    }
  </script>
</body>

</html>
